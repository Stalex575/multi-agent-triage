# ─────────────────────────────────────────────────────────────────────────────
#  CI/CD — Build, Test, and Deploy to AWS ECS Fargate
# ─────────────────────────────────────────────────────────────────────────────
name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# ─────────────────────────────────────────────────────────────────────────────
#  Top-level permissions for OIDC token issuance
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  id-token: write   # Required for requesting the OIDC JWT
  contents: read    # Required for actions/checkout

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  #  Job 1 — Build & Test
  # ═══════════════════════════════════════════════════════════════════════════
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip dependencies ───────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # ── 4. Install dependencies ─────────────────────────────────────────
      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-mock pytest-asyncio
          pip install -e .

      # ── 5. Run test suite ───────────────────────────────────────────────
      - name: Run pytest
        run: pytest -v --tb=short

      # ── 6. Docker Buildx setup ─────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 7. Validate Docker image builds ────────────────────────────────
      - name: Test-build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: multi-agent-triage-router:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════════════════════════
  #  Job 2 — Deploy to AWS ECS Fargate (OIDC Keyless Auth)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-test                       # Gate: only runs after tests pass
    if: github.event_name == 'push'             # Skip deploys on PRs

    environment: production                     # Optional: use GitHub Environments for approvals

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Configure AWS credentials via OIDC ───────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 3. Login to Amazon ECR ──────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── 4. Build, tag, and push Docker image to ECR ────────────────────
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: triage-repo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ── 5. Render ECS Task Definition with secrets injected ────────────
      #    Injects the container image URI and API keys into the task def.
      - name: Render Amazon ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: triage-container
          image: ${{ steps.build-image.outputs.image }}
          environment-variables: |
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
            LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}
            LANGCHAIN_PROJECT=${{ secrets.LANGCHAIN_PROJECT }}

      # ── 6. Deploy to Amazon ECS ────────────────────────────────────────
      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: triage-service
          cluster: triage-cluster
          wait-for-service-stability: true
